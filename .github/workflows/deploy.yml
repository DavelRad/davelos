# CI/CD — build + deploy on push to main.
# One Cloud Run service (`davelos`) serves the built SPA AND the /api bot.
# Cloud Build runs the multi-stage root Dockerfile (vite build -> python server),
# so no Node/Python setup is needed in the runner.
#
# Auth is KEYLESS via Workload Identity Federation (OIDC) — no long-lived JSON
# key in GitHub secrets. GitHub mints a short-lived OIDC token; GCP trusts it
# only for this repo (the provider is scoped to repository_owner == DavelRad and
# the service account is impersonable only by attribute.repository DavelRad/davelos).
# The provider name + service-account email below are NOT secrets.
#
# Infra (set up once via gcloud; see DEPLOY.md):
#   - SA  gh-deployer@davel-portfolio.iam.gserviceaccount.com  (roles: run.admin,
#         iam.serviceAccountUser, cloudbuild.builds.editor, artifactregistry.writer,
#         storage.admin, serviceusage.serviceUsageConsumer)
#   - WIF pool `github` + provider `github-provider`
# The ANTHROPIC_API_KEY / Spotify secrets are bound to the service out-of-band;
# `gcloud run deploy` preserves them across deploys.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# required for the OIDC token exchange
permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: davel-portfolio
          workload_identity_provider: projects/630783796094/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: gh-deployer@davel-portfolio.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy davelos \
            --source . \
            --project davel-portfolio \
            --region us-central1 \
            --allow-unauthenticated \
            --max-instances 1 \
            --memory 512Mi \
            --quiet
