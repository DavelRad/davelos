# CI/CD — build + deploy on push to main.
# One Cloud Run service (`davelos`) serves the built SPA AND the /api bot.
# Cloud Build runs the multi-stage root Dockerfile (vite build -> python server),
# so no Node/Python setup is needed in the runner.
#
# Requires two GitHub repo secrets (Settings → Secrets and variables → Actions):
#   GCP_PROJECT_ID  — davel-portfolio
#   GCP_SA_KEY      — JSON key for a deploy service account with roles:
#                     run.admin, iam.serviceAccountUser, cloudbuild.builds.editor,
#                     artifactregistry.writer, storage.admin,
#                     serviceusage.serviceUsageConsumer
#
# The ANTHROPIC_API_KEY secret binding is configured on the service out-of-band
# (see DEPLOY.md); `gcloud run deploy` preserves it across deploys, so it is not
# repeated here. (Workload Identity Federation is the hardened alternative to a
# JSON key — see DEPLOY.md.)
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy davelos \
            --source . \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region us-central1 \
            --allow-unauthenticated \
            --max-instances 1 \
            --memory 512Mi \
            --quiet
