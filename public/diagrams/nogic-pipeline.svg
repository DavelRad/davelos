<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b6f8a"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="1" y="1" width="918" height="258" rx="16" fill="#15161f" stroke="#2a2b3a" stroke-width="1"/>

  <!-- title -->
  <text x="28" y="40" fill="#a78bfa" font-size="13" font-weight="700" letter-spacing="0.4">NOGIC</text>
  <text x="80" y="40" fill="#7e8398" font-size="13" font-weight="500">· how a code change gets read &amp; explained</text>

  <!-- flow boxes -->
  <g>
    <!-- 1 Codebase -->
    <rect x="21" y="96" width="150" height="68" rx="12" fill="#1d1e2b" stroke="#3a3b50" stroke-width="1"/>
    <text x="96" y="126" text-anchor="middle" fill="#ececf5" font-size="13" font-weight="600">Codebase</text>
    <text x="96" y="146" text-anchor="middle" fill="#8a8fa6" font-size="10">repo + symbol graph</text>

    <!-- 2 Retrieval -->
    <rect x="203" y="96" width="150" height="68" rx="12" fill="#1d1e2b" stroke="#3a3b50" stroke-width="1"/>
    <text x="278" y="126" text-anchor="middle" fill="#ececf5" font-size="13" font-weight="600">Retrieval</text>
    <text x="278" y="146" text-anchor="middle" fill="#8a8fa6" font-size="10">BM25 + LLM rerank</text>

    <!-- 3 Agent loop (accent) -->
    <rect x="385" y="96" width="150" height="68" rx="12" fill="url(#accent)" stroke="#a78bfa" stroke-width="1"/>
    <text x="460" y="126" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Agent loop</text>
    <text x="460" y="146" text-anchor="middle" fill="#e9dcff" font-size="10">6 tools · Claude routing</text>

    <!-- 4 Verification -->
    <rect x="567" y="96" width="150" height="68" rx="12" fill="#1d1e2b" stroke="#3a3b50" stroke-width="1"/>
    <text x="642" y="126" text-anchor="middle" fill="#ececf5" font-size="13" font-weight="600">Verification</text>
    <text x="642" y="146" text-anchor="middle" fill="#8a8fa6" font-size="10">hallucination check</text>

    <!-- 5 Walkthrough -->
    <rect x="749" y="96" width="150" height="68" rx="12" fill="#1d1e2b" stroke="#3a3b50" stroke-width="1"/>
    <text x="824" y="126" text-anchor="middle" fill="#ececf5" font-size="13" font-weight="600">Walkthrough</text>
    <text x="824" y="146" text-anchor="middle" fill="#8a8fa6" font-size="10">PR + codebase</text>
  </g>

  <!-- arrows -->
  <g stroke="#6b6f8a" stroke-width="1.6" fill="none">
    <line x1="173" y1="130" x2="199" y2="130" marker-end="url(#arrow)"/>
    <line x1="355" y1="130" x2="381" y2="130" marker-end="url(#arrow)"/>
    <line x1="537" y1="130" x2="563" y2="130" marker-end="url(#arrow)"/>
    <line x1="719" y1="130" x2="745" y2="130" marker-end="url(#arrow)"/>
  </g>

  <!-- verification feedback loop back into the agent -->
  <path d="M642 164 L642 196 L460 196 L460 168" stroke="#5a4b8a" stroke-width="1.4" fill="none" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="551" y="212" text-anchor="middle" fill="#6f6f8a" font-size="9.5">re-checks claims against sandboxed checkouts</text>

  <!-- footer -->
  <text x="460" y="240" text-anchor="middle" fill="#7e8398" font-size="10.5">FastAPI · Cloud Run · prompt caching → ~90% input-token cost · 35,000+ installs</text>
</svg>
